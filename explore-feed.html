<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CultureConnect – Explore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(15,52,96,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: calc(env(safe-area-inset-top, 0px) + 0.7rem) 1rem 0.7rem;
    }

    .topbar-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .brand-sm {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .brand-sm span { font-size: 1.4rem; }

    .lang-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 2rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      min-height: 36px;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-pill select {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .lang-pill select option { background: #1a1a2e; }

    /* Category filter strip */
    .filter-strip {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filter-strip::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 0.38rem 0.85rem;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border-radius: 2rem;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-size: 0.8rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .filter-chip.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
      font-weight: 600;
    }

    /* ── Feed ── */
    .feed {
      max-width: 620px;
      margin: 0 auto;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── Did You Know card ── */
    .dyk-card {
      background: linear-gradient(120deg, rgba(233,69,96,0.22) 0%, rgba(15,52,96,0.4) 100%);
      border: 1px solid rgba(233,69,96,0.35);
      border-radius: 1rem;
      padding: 1rem 1.1rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: fadeUp 0.4s ease both;
    }

    .dyk-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .dyk-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e94560;
      margin-bottom: 0.25rem;
    }

    .dyk-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.88);
    }

    .dyk-refresh {
      margin-top: 0.5rem;
      background: none;
      border: none;
      color: #e94560;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Section heading ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.25rem 0;
    }

    .section-head h2 { font-size: 1rem; font-weight: 700; }

    .section-head span {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
    }

    /* ── Story card ── */
    .story-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }

    .story-card:active { border-color: rgba(233,69,96,0.5); }

    .story-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.04);
    }

    .story-media.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      aspect-ratio: 16/9;
    }

    .story-body { padding: 0.9rem 1rem 1rem; }

    .story-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .story-cat {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #e94560;
    }

    .story-time {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
    }

    .story-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 0.4rem;
    }

    .story-text {
      font-size: 0.88rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.7);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      padding-top: 0.65rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .story-author {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .author-name { font-size: 0.8rem; color: rgba(255,255,255,0.6); }

    .story-location {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .story-actions {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      cursor: pointer;
      padding: 0.3rem 0.4rem;
      min-height: 36px;
      min-width: 36px;
      border-radius: 0.4rem;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }

    .action-btn:active { color: #e94560; }
    .action-btn.liked { color: #e94560; }

    /* ── Translation badge ── */
    .translated-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      margin-top: 0.35rem;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: rgba(255,255,255,0.06);
      border-radius: 0.5rem;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .skeleton-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      overflow: hidden;
    }

    .sk-media { height: 160px; }
    .sk-body { padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .sk-line { height: 12px; border-radius: 0.3rem; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: rgba(15,52,96,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom, 0px));
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      padding: 0.4rem 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-height: 52px;
      justify-content: center;
      text-decoration: none;
      color: rgba(255,255,255,0.4);
      transition: color 0.15s;
    }

    .nav-item.active { color: #e94560; }
    .nav-item:active { color: #e94560; }

    .nav-icon { font-size: 1.4rem; line-height: 1; }
    .nav-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.02em; }

    .nav-post {
      background: #e94560;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-top: -18px;
      border: 3px solid #1a1a2e;
      box-shadow: 0 4px 12px rgba(233,69,96,0.45);
    }

    /* Desktop */
    @media (min-width: 640px) {
      .story-card:hover { border-color: rgba(233,69,96,0.4); }
      .filter-chip:hover { border-color: #e94560; color: #fff; }
      .action-btn:hover { color: #e94560; }
    }
  </style>
</head>

        title: { en: 'Mysuru Dasara — A Royal Spectacle', hi: 'मैसूर दशहरा — एक शाही दृश्य', fr: 'Mysuru Dasara — Un Spectacle Royal', ta: 'மைசூரு தசரா — ஒரு அரச காட்சி', kn: 'ಮೈಸೂರು ದಸರಾ — ಒಂದು ರಾಜವೈಭವ' },
        text: { en: 'For 10 days every October, Mysuru transforms into a city of lights. The Dasara procession with caparisoned elephants and cultural performances draws millions worldwide.', hi: 'हर अक्टूबर में 10 दिनों के लिए मैसूर रोशनी के शहर में बदल जाता है।', fr: 'Pendant 10 jours chaque octobre, Mysuru se transforme en cité lumineuse avec des éléphants parés et des spectacles culturels.', ta: 'ஒவ்வொரு அக்டோபரிலும் 10 நாட்கள் மைசூரு விளக்குகளின் நகரமாக மாறுகிறது.', kn: 'ಪ್ರತಿ ಅಕ್ಟೋಬರ್‌ನಲ್ಲಿ 10 ದಿನಗಳ ಕಾಲ ಮೈಸೂರು ಬೆಳಕಿನ ನಗರವಾಗಿ ಮಾರ್ಪಡುತ್ತದೆ.' },
        author: 'Kavya R', location: 'Mysuru, India', time: '1d ago', likes: 312, translated: false,
      },
      {
        id: 4, cat: 'food',
        emoji: '🥐',
        title: { en: 'The French Art of the Croissant', hi: 'क्रोइसां की फ्रांसीसी कला', fr: 'L\'Art Français du Croissant', ta: 'குரோசன்னின் பிரெஞ்சு கலை', kn: 'ಕ್ರೊಯಸ್ಸಾನ್‌ನ ಫ್ರೆಂಚ್ ಕಲೆ' },
        text: { en: 'A perfect croissant takes three days to make — 27 layers of butter-laminated dough folded with precision. In France, it is more than breakfast; it is ritual.', hi: 'एक परफेक्ट क्रोइसां बनाने में तीन दिन लगते हैं। फ्रांस में यह सिर्फ नाश्ता नहीं, एक परंपरा है।', fr: 'Un croissant parfait demande trois jours — 27 couches de pâte beurrée. En France, c\'est plus qu\'un petit-déjeuner, c\'est un rituel.', ta: 'ஒரு சரியான குரோசன் தயாரிக்க மூன்று நாட்கள் ஆகும். பிரான்சில் இது வெறும் காலை உணவல்ல, ஒரு சடங்கு.', kn: 'ಒಂದು ಪರಿಪೂರ್ಣ ಕ್ರೊಯಸ್ಸಾನ್ ತಯಾರಿಸಲು ಮೂರು ದಿನಗಳು ಬೇಕು. ಫ್ರಾನ್ಸ್‌ನಲ್ಲಿ ಇದು ಒಂದು ಆಚರಣೆ.' },
        author: 'Marie D', location: 'Paris, France', time: '2d ago', likes: 201, translated: true,
      },
      {
        id: 5, cat: 'tourist',
        emoji: '🏛️',
        title: { en: 'Hampi — Ruins That Whisper History', hi: 'हम्पी — इतिहास की फुसफुसाती खंडहरें', fr: 'Hampi — Des Ruines qui Murmurent l\'Histoire', ta: 'ஹம்பி — வரலாற்றை கிசுகிசுக்கும் இடிபாடுகள்', kn: 'ಹಂಪಿ — ಇತಿಹಾಸ ಪಿಸುಗುಟ್ಟುವ ಅವಶೇಷಗಳು' },
        text: { en: 'Once the capital of the mighty Vijayanagara Empire, Hampi\'s boulder-strewn landscape and ancient temples are a UNESCO World Heritage Site and a traveller\'s dream.', hi: 'कभी विजयनगर साम्राज्य की राजधानी रहा हम्पी अब यूनेस्को विश्व धरोहर स्थल है।', fr: 'Ancienne capitale de l\'Empire Vijayanagara, Hampi est un site du patrimoine mondial de l\'UNESCO et un rêve pour les voyageurs.', ta: 'ஒரு காலத்தில் விஜயநகர பேரரசின் தலைநகராக இருந்த ஹம்பி இப்போது யுனெஸ்கோ உலக பாரம்பரிய தளமாகும்.', kn: 'ವಿಜಯನಗರ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿದ್ದ ಹಂಪಿ ಯುನೆಸ್ಕೋ ವಿಶ್ವ ಪರಂಪರೆ ತಾಣ.' },
        author: 'Arjun K', location: 'Hampi, India', time: '3d ago', likes: 445, translated: false,
      },
    ];

    /* ── State ── */
    let currentLang = 'en';
    let currentCat = 'all';
    let dykIndex = 0;
    const liked = new Set();

    /* ── Language ── */
    function changeLang(lang) {
      currentLang = lang;
      renderDyk();
      renderStories();
    }

    /* ── Did You Know ── */
    function renderDyk() {
      const snippets = dykSnippets[currentLang] || dykSnippets.en;
      document.getElementById('dyk-text').textContent = snippets[dykIndex % snippets.length];
    }

    function nextDyk() {
      dykIndex++;
      renderDyk();
    }

    /* ── Filter ── */
    function filterCat(cat, el) {
      currentCat = cat;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderStories();
    }

    /* ── Render stories ── */
    function renderStories() {
      const filtered = currentCat === 'all' ? stories : stories.filter(s => s.cat === currentCat);
      document.getElementById('story-count').textContent = `${filtered.length} stories`;

      const list = document.getElementById('story-list');
      list.innerHTML = '';

      if (filtered.length === 0) {
        list.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:rgba(255,255,255,0.35);font-size:0.9rem;">No stories in this category yet.<br>Be the first to share one! 🌍</div>`;
        return;
      }

      filtered.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'story-card';
        card.style.animationDelay = `${i * 0.05}s`;

        const title = s.title[currentLang] || s.title.en;
        const text  = s.text[currentLang]  || s.text.en;
        const isLiked = liked.has(s.id);
        const isTranslated = s.translated && currentLang !== 'en';

        card.innerHTML = `
          <div class="story-media placeholder">${s.emoji}</div>
          <div class="story-body">
            <div class="story-meta">
              <span class="story-cat">${catLabel(s.cat)}</span>
              <span class="story-time">${s.time}</span>
            </div>
            <div class="story-title">${title}</div>
            <div class="story-text">${text}</div>
            ${isTranslated ? `<div class="translated-badge">🤖 Translated by Claude</div>` : ''}
            <div class="story-footer">
              <div class="story-author">
                <div class="avatar">${s.author[0]}</div>
                <span class="author-name">${s.author}</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <span class="story-location">📍 ${s.location}</span>
                <div class="story-actions">
                  <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(event,${s.id},this)">
                    ${isLiked ? '❤️' : '🤍'} <span>${s.likes + (isLiked ? 1 : 0)}</span>
                  </button>
                  <button class="action-btn" onclick="shareStory(event,'${title}')">↗️</button>
                </div>
              </div>
            </div>
          </div>`;
        list.appendChild(card);
      });
    }

    function catLabel(cat) {
      const map = { food:'🍛 Food', culture:'🎭 Culture', tourist:'🏛️ Tourist', events:'🎉 Events', traditions:'🪔 Traditions', art:'🎨 Art', music:'🎵 Music', nature:'🌿 Nature' };
      return map[cat] || cat;
    }

    function toggleLike(e, id, btn) {
      e.stopPropagation();
      if (liked.has(id)) {
        liked.delete(id);
        btn.classList.remove('liked');
      } else {
        liked.add(id);
        btn.classList.add('liked');
      }
      renderStories();
    }

    function shareStory(e, title) {
      e.stopPropagation();
      if (navigator.share) {
        navigator.share({ title: 'CultureConnect', text: title, url: window.location.href });
      } else {
        navigator.clipboard?.writeText(window.location.href);
        alert('Link copied!');
      }
    }

    /* ── Init ── */
    const savedLang = localStorage.getItem('cc_lang') || 'en';
    currentLang = savedLang;
    document.getElementById('lang-select').value = savedLang;
    renderDyk();
    renderStories();
  </script>
