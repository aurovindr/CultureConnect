<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CultureConnect – Ask Claude</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      flex-shrink: 0;
      background: rgba(15,52,96,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: calc(env(safe-area-inset-top, 0px) + 0.7rem) 1rem 0.7rem;
    }

    .back {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.5rem;
      color: #fff;
      font-size: 1.2rem;
      text-decoration: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .topbar-info { flex: 1; min-width: 0; }
    .topbar-info h1 { font-size: 1.05rem; font-weight: 700; }
    .topbar-info p  { font-size: 0.72rem; color: rgba(255,255,255,0.45); margin-top: 1px; }

    .lang-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 2rem;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      min-height: 36px;
      flex-shrink: 0;
    }

    .lang-pill select {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.78rem;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .lang-pill select option { background: #1a1a2e; }

    /* ── Message list ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* ── Welcome state ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1;
      padding: 2rem 1rem;
      gap: 1rem;
    }

    .welcome-icon { font-size: 3.5rem; }
    .welcome h2 { font-size: 1.2rem; font-weight: 700; }
    .welcome p  { font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.55; max-width: 300px; }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      max-width: 360px;
      margin-top: 0.5rem;
    }

    .suggestion {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.75rem;
      padding: 0.65rem 0.9rem;
      font-size: 0.84rem;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    .suggestion:active, .suggestion:hover { border-color: #e94560; color: #fff; background: rgba(233,69,96,0.08); }

    /* ── Message bubbles ── */
    .msg {
      display: flex;
      gap: 0.6rem;
      animation: fadeUp 0.25s ease both;
      max-width: 100%;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-top: 2px;
    }

    .msg.bot .msg-avatar  { background: linear-gradient(135deg, #e94560, #0f3460); }
    .msg.user .msg-avatar { background: rgba(255,255,255,0.12); font-size: 0.8rem; }

    .msg-bubble {
      max-width: calc(100% - 80px);
      padding: 0.7rem 0.9rem;
      border-radius: 1rem;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .msg.bot .msg-bubble {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-top-left-radius: 0.2rem;
    }

    .msg.user .msg-bubble {
      background: #e94560;
      border-top-right-radius: 0.2rem;
    }

    .msg-meta {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      margin-top: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .msg.user .msg-meta { justify-content: flex-end; }

    .translated-tag {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      animation: fadeUp 0.25s ease both;
    }

    .typing-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .typing-bubble {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      border-bottom-left-radius: 0.2rem;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Input bar ── */
    .input-bar {
      flex-shrink: 0;
      background: rgba(15,52,96,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 0.65rem 0.75rem calc(0.65rem + env(safe-area-inset-bottom, 0px));
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1.25rem;
      display: flex;
      align-items: flex-end;
      padding: 0.5rem 0.75rem;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: #e94560; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      outline: none;
      resize: none;
      line-height: 1.45;
      max-height: 100px;
      overflow-y: auto;
      font-family: inherit;
    }

    #user-input::placeholder { color: rgba(255,255,255,0.3); }

    .send-btn {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: #e94560;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:disabled { background: rgba(255,255,255,0.12); cursor: default; }
    .send-btn:not(:disabled):active { transform: scale(0.93); background: #c73652; }
  </style>
</head>

        food:    "🍛 ದಕ್ಷಿಣ ಭಾರತದ ಆಹಾರ ಅಕ್ಕಿ, ಬೇಳೆ, ತೆಂಗಿನಕಾಯಿ ಮತ್ತು ಹುಣಸೆಹಣ್ಣನ್ನು ಆಧಾರವಾಗಿ ಹೊಂದಿದೆ. ಇಡ್ಲಿ, ದೋಸೆಯಂತಹ ಹುದುಗಿಸಿದ ಆಹಾರಗಳು ಆರೋಗ್ಯಕರ ಮತ್ತು ರುಚಿಕರ.",
        dasara:  "🎉 **ಮೈಸೂರು ದಸರಾ** ಭಾರತದ ಅತ್ಯಂತ ಭವ್ಯ ಹಬ್ಬಗಳಲ್ಲಿ ಒಂದು. 10 ದಿನಗಳ ಕಾಲ ಆಚರಿಸಲಾಗುವ ಈ ಹಬ್ಬದಲ್ಲಿ ಅಲಂಕೃತ ಆನೆಯ ಮೇಲೆ ಚಾಮುಂಡೇಶ್ವರಿ ವಿಗ್ರಹ ಮೆರವಣಿಗೆ ಸಾಗುತ್ತದೆ.",
        kolam:   "🎨 **ಕೋಲಮ್** ದಕ್ಷಿಣ ಭಾರತದ ಸಾಂಪ್ರದಾಯಿಕ ಕಲೆ. ಪ್ರತಿ ಬೆಳಿಗ್ಗೆ ಅಕ್ಕಿ ಹಿಟ್ಟಿನಿಂದ ಬಾಗಿಲ ಮುಂದೆ ಚಿತ್ರಗಳನ್ನು ಬಿಡಿಸಲಾಗುತ್ತದೆ. ಇದು ಪ್ರಕೃತಿಗೆ ಅರ್ಪಣೆ ಮತ್ತು ಅತಿಥಿ ಸ್ವಾಗತ.",
      },
    };

    let currentLang = localStorage.getItem('cc_lang') || 'en';
    let chatActive = false;

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('cc_lang', lang);
      if (!chatActive) renderWelcome();
    }

    function renderWelcome() {
      document.getElementById('welcome-title').textContent = welcomeTitles[currentLang] || welcomeTitles.en;
      const suggs = suggestions[currentLang] || suggestions.en;
      const container = document.getElementById('suggestions');
      container.innerHTML = '';
      suggs.forEach(s => {
        const el = document.createElement('div');
        el.className = 'suggestion';
        el.textContent = s;
        el.onclick = () => sendText(s);
        container.appendChild(el);
      });
    }

    function getResponse(text) {
      const t = text.toLowerCase();
      const r = botResponses[currentLang] || botResponses.en;
      if (t.includes('diwali') || t.includes('दीवाली') || t.includes('தீபாவளி') || t.includes('ದೀಪಾವಳಿ')) return r.diwali;
      if (t.includes('food') || t.includes('cuisine') || t.includes('भोजन') || t.includes('உணவு') || t.includes('ಆಹಾರ') || t.includes('nourriture')) return r.food;
      if (t.includes('dasara') || t.includes('दशहरा') || t.includes('தசரா') || t.includes('ದಸರಾ')) return r.dasara;
      if (t.includes('kolam') || t.includes('கோலம்') || t.includes('ಕೋಲಮ್')) return r.kolam;
      return r.default;
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(role, text) {
      const welcome = document.getElementById('welcome-state');
      if (welcome) welcome.remove();
      chatActive = true;

      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      const avatar = role === 'bot' ? '🤖' : '👤';
      const isTranslated = role === 'bot' && currentLang !== 'en';

      div.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div>
          <div class="msg-bubble">${formatText(text)}</div>
          <div class="msg-meta">
            ${isTranslated ? '<span class="translated-tag">🤖 Claude · translated</span>' : ''}
            <span>${now()}</span>
          </div>
        </div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      const welcome = document.getElementById('welcome-state');
      if (welcome) welcome.remove();
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="typing-avatar">🤖</div>
        <div class="typing-bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing-indicator')?.remove();
    }

    function sendText(text) {
      appendMessage('user', text);
      document.getElementById('user-input').value = '';
      document.getElementById('send-btn').disabled = true;
      autoResize(document.getElementById('user-input'));

      showTyping();
      // Simulate Claude API latency (replace with real fetch)
      setTimeout(() => {
        removeTyping();
        appendMessage('bot', getResponse(text));
      }, 1200 + Math.random() * 800);
    }

    function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      sendText(text);
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
      document.getElementById('send-btn').disabled = !el.value.trim();
    }

    /* ── Init ── */
    document.getElementById('lang-select').value = currentLang;
    renderWelcome();
  </script>

</body>
</html>
